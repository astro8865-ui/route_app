<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>ルート作成アプリ</title>

  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css">
  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-polylinedecorator/dist/leaflet.polylineDecorator.js"></script>
  <script src="https://unpkg.com/leaflet-geometryutil"></script>

  <style>
    body, html { margin: 0; padding: 0; height: 100%; }
    #map { height: 100%; width: 100%; }

    .btn {
      position: absolute; left: 10px; z-index: 9999; padding: 10px 18px;
      background: linear-gradient(135deg, #4e9af1, #1c6cd5);
      color: white; border: none; border-radius: 8px; cursor: pointer;
      font-size: 14px; font-weight: bold; box-shadow: 0 3px 6px rgba(0,0,0,0.2);
    }
    
    #undoBtn { top: 10px; } #saveBtn { top: 60px; } #listBtn { top: 110px; } 
    #clearBtn { top: 160px; } #locateBtn { top: 210px; padding: 8px; font-size: 20px; }
    
    #searchContainer { position: absolute; top: 10px; right: 10px; z-index: 9999; width: 250px; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
    #searchBox { padding: 10px; width: 100%; box-sizing: border-box; border-radius: 8px; border: 1px solid #ccc; }
    #searchBtn { width: 100%; margin-top: 10px; padding: 10px; background: #4e9af1; color: white; border: none; border-radius: 8px; cursor: pointer; }
    #searchResults { margin-top: 10px; max-height: 300px; overflow-y: auto; border-top: 1px solid #eee; display: none; }
    .search-item { padding: 8px; cursor: pointer; border-bottom: 1px solid #eee; font-size: 13px; }
    .search-item:hover { background: #f0f0f0; }

    #distanceBox { position: absolute; top: 260px; left: 10px; z-index: 9999; background: white; padding: 10px; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.2); font-weight: bold; }
    #routeList { position: absolute; top: 310px; left: 10px; z-index: 9999; background: white; border: 1px solid #ccc; padding: 10px; max-height: 300px; width: 250px; overflow-y: auto; display: none; border-radius: 8px; box-shadow: 0 3px 6px rgba(0,0,0,0.2); }
    .custom-marker { transform: translate(-7px, -7px); }
  </style>
</head>

<body>
  <div id="undoBtn" class="btn">戻る</div>
  <div id="saveBtn" class="btn">保存</div>
  <div id="listBtn" class="btn">一覧</div>
  <div id="clearBtn" class="btn">クリア</div>
  <div id="locateBtn" class="btn">🎯</div>
  <div id="distanceBox">総距離：0 km</div>
  <div id="routeList"></div>

  <div id="searchContainer">
    <input type="text" id="searchBox" placeholder="地名・施設名を入力">
    <button id="searchBtn">検索</button>
    <div id="searchResults"></div>
  </div>

  <div id="map"></div>

  <script>
    const map = L.map('map', { zoomControl: false }).setView([35.25, 136.80], 14);
    L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', { maxZoom: 19 }).addTo(map);

    let searchMarkers = []; let points = []; let markers = []; let currentRoute = null; let myMarker = null; let routeDecorator = null;

    document.getElementById("searchBox").oninput = function() {
      if (this.value === "") {
        document.getElementById("searchResults").style.display = "none";
        searchMarkers.forEach(m => map.removeLayer(m));
        searchMarkers = [];
      }
    };

    document.getElementById("searchBtn").onclick = function() {
      const query = document.getElementById("searchBox").value;
      const resDiv = document.getElementById("searchResults");
      if (!query) return;
      searchMarkers.forEach(m => map.removeLayer(m)); searchMarkers = [];
      resDiv.style.display = "block"; resDiv.innerHTML = "検索中...";
      const bounds = map.getBounds();
      const viewbox = `${bounds.getWest()},${bounds.getSouth()},${bounds.getEast()},${bounds.getNorth()}`;
      fetch(`https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(query)}&limit=50&viewbox=${viewbox}&bounded=1`)
        .then(res => res.json())
        .then(data => {
          resDiv.innerHTML = "";
          data.forEach(item => {
            const marker = L.marker([item.lat, item.lon]).addTo(map);
            marker.bindPopup(`<b>${item.display_name.split(',')[0]}</b><br><button onclick="map.setView([${item.lat}, ${item.lon}], 16)">ここへ移動</button>`);
            searchMarkers.push(marker);
            const div = document.createElement("div"); div.className = "search-item"; div.innerText = item.display_name;
            div.onclick = () => { marker.openPopup(); }; resDiv.appendChild(div);
          });
        });
    };

    document.getElementById("locateBtn").onclick = () => {
      navigator.geolocation.getCurrentPosition(pos => {
        const lat = pos.coords.latitude; const lng = pos.coords.longitude;
        map.panTo([lat, lng]);
        if (myMarker) map.removeLayer(myMarker);
        myMarker = L.circleMarker([lat, lng], { color: 'orange', radius: 8, fillOpacity: 0.8 }).addTo(map).bindPopup("現在地");
      });
    };

    function getMarkerColor(i, total) { return i === 0 ? "green" : (i === total - 1 ? "red" : "blue"); }
    function redrawMarkers() {
      markers.forEach(m => map.removeLayer(m)); markers = [];
      points.forEach((p, i) => {
        const marker = L.marker([p[1], p[0]], { draggable: true, icon: L.divIcon({ className: "custom-marker", html: `<div style="width:14px;height:14px;background:${getMarkerColor(i, points.length)};border-radius:50%;border:2px solid white;"></div>` }) }).addTo(map);
        marker.on("click", (e) => { L.DomEvent.stopPropagation(e); points.splice(i, 1); if (currentRoute) map.removeLayer(currentRoute); redrawMarkers(); if (points.length >= 2) drawRoute(points); });
        marker.on("dragend", (e) => { const pos = e.target.getLatLng(); points[i] = [pos.lng, pos.lat]; if (currentRoute) map.removeLayer(currentRoute); redrawMarkers(); if (points.length >= 2) drawRoute(points); });
        markers.push(marker);
      });
    }
    map.on('click', (e) => { points.push([e.latlng.lng, e.latlng.lat]); redrawMarkers(); if (points.length >= 2) drawRoute(points); });
    function drawRoute(points) {
      const coordsStr = points.map(p => `${p[0]},${p[1]}`).join(";");
      fetch(`https://router.project-osrm.org/route/v1/driving/${coordsStr}?overview=full&geometries=geojson`)
        .then(res => res.json())
        .then(data => {
          if (currentRoute) map.removeLayer(currentRoute);
          if (routeDecorator) map.removeLayer(routeDecorator);
          
          const route = data.routes[0]; document.getElementById("distanceBox").innerText = `総距離：${(route.distance / 1000).toFixed(2)} km`;
          const latlngs = route.geometry.coordinates.map(c => [c[1], c[0]]);
          currentRoute = L.polyline(latlngs, { color: 'blue', weight: 8 }).addTo(map);
          
          // 矢印の追加
          routeDecorator = L.polylineDecorator(currentRoute, {
            patterns: [{ offset: 25, repeat: 50, symbol: L.Symbol.arrowHead({ pixelSize: 12, polygon: false, pathOptions: { stroke: true, color: 'white', weight: 2 } }) }]
          }).addTo(map);
        });
    }
    document.getElementById("undoBtn").onclick = () => { points.pop(); if (currentRoute) map.removeLayer(currentRoute); if (routeDecorator) map.removeLayer(routeDecorator); redrawMarkers(); if (points.length >= 2) drawRoute(points); else document.getElementById("distanceBox").innerText = "総距離：0 km"; };
    document.getElementById("clearBtn").onclick = () => { if (!confirm("すべてクリアしますか？")) return; markers.forEach(m => map.removeLayer(m)); markers = []; points = []; if (currentRoute) { map.removeLayer(currentRoute); currentRoute = null; } if (routeDecorator) { map.removeLayer(routeDecorator); routeDecorator = null; } document.getElementById("distanceBox").innerText = "総距離：0 km"; };
    
    document.getElementById("saveBtn").onclick = () => {
      const name = prompt("ルート名を入力してください");
      if (!name) return;
      let saved = JSON.parse(localStorage.getItem("routes") || "[]");
      const idx = saved.findIndex(r => r.name === name);
      if (idx !== -1 && !confirm(`「${name}」は存在します。上書きしますか？`)) return;
      if (idx !== -1) saved[idx].points = points; else saved.push({ name, points });
      localStorage.setItem("routes", JSON.stringify(saved));
      alert("保存完了");
    };

    document.getElementById("listBtn").onclick = () => {
      const listDiv = document.getElementById("routeList"); listDiv.style.display = listDiv.style.display === "none" ? "block" : "none";
      const saved = JSON.parse(localStorage.getItem("routes") || "[]"); listDiv.innerHTML = "";
      saved.forEach((route, index) => {
        const item = document.createElement("div"); 
        item.style.borderBottom = "1px solid #ccc"; item.style.padding = "5px";
        item.innerHTML = `<strong>${route.name}</strong><br>
                          <button onclick="loadRoute(${index})">読込</button>
                          <button onclick="deleteRoute(${index})">削除</button>`;
        listDiv.appendChild(item);
      });
    };

    function loadRoute(index) {
      points = JSON.parse(localStorage.getItem("routes"))[index].points;
      markers.forEach(m => map.removeLayer(m)); if (currentRoute) map.removeLayer(currentRoute); if (routeDecorator) map.removeLayer(routeDecorator);
      redrawMarkers(); drawRoute(points);
    }
    function deleteRoute(index) {
      if (!confirm("このルートを削除しますか？")) return;
      let saved = JSON.parse(localStorage.getItem("routes") || "[]");
      saved.splice(index, 1);
      localStorage.setItem("routes", JSON.stringify(saved));
      document.getElementById("listBtn").click();
    }
  </script>
</body>
</html>
